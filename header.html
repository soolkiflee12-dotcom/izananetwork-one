  <style>
    /* Mobile Menu Animation */
    #mobileMenu {
      position: fixed;
      right: 0;
      top: 56px;
      height: calc(100vh - 56px);
      width: 280px;
      background: white;
      transform: translateX(100%);
      transition: transform 0.3s ease-in-out;
      z-index: 9998;
      overflow-y: auto;
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
    }

    #mobileMenu.active {
      transform: translateX(0);
    }

    /* Dark mode support */
    .dark #mobileMenu {
      background: rgb(3, 7, 18);
    }

    /* Backdrop Overlay */
    #menuBackdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
      z-index: 9997;
    }

    #menuBackdrop.active {
      opacity: 1;
      visibility: visible;
    }

    /* Hamburger Animation */
 #menuBtn span {
  transition: all 0.3s ease-in-out;
  transform-origin: center;
    }

    #menuBtn.active span:nth-child(1) {
      transform: rotate(45deg) translateY(11px);
    }

    #menuBtn.active span:nth-child(2) {
      opacity: 0;
      transform: translateX(-10px);
    }

    #menuBtn.active span:nth-child(3) {
      transform: rotate(-45deg) translateY(-11px);
    }
  /* ===== MENU SLIDE (ลื่น + เด้ง) ===== */
#mobileMenu {
  transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

/* ===== BACKDROP (ชัดขึ้น) ===== */
#menuBackdrop {
  backdrop-filter: blur(8px);
}

/* ===== MENU ITEM เอฟเฟคเทพ ===== */
.menu-item {
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

/* hover move + glow */
.menu-item:hover {
  transform: translateX(10px) scale(1.03);
  box-shadow: 0 15px 35px rgba(59,130,246,0.35);
}

/* แสงวิ่งแบบ animation */
.menu-item::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(59,130,246,0.5), transparent);
  opacity: 0;
  transform: translateX(-100%);
}

.menu-item:hover::before {
  opacity: 1;
  animation: sweep 0.6s ease;
}

@keyframes sweep {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}

/* ripple (แรงขึ้น) */
.ripple::after {
  width: 150px;
  height: 150px;
  background: rgba(255,255,255,0.4);
}

/* icon animation */
.menu-item i {
  transition: transform 0.3s ease;
}

.menu-item:hover i {
  transform: scale(1.2) rotate(5deg);
}

/* text glow */
.menu-item:hover {
  color: #3b82f6;
}
/* Active Link Styling - Desktop */
.nav-link.active {
  color: #3b82f6;
  font-weight: 600;
  border-bottom: 2px solid #3b82f6;
  padding-bottom: 2px;
}

.nav-link {
  position: relative;
  transition: all 0.3s ease;
}

.dark .nav-link.active {

  border-bottom-color: #60a5fa;
}
.mobile-menu-item.active {
  background: linear-gradient(to right, #3b82f6, #2563eb);
  color: white;
  font-weight: 600;
}

.dark .mobile-menu-item.active {
  background: linear-gradient(to right, #3b82f6, #1e40af);
}
  </style>

<!-- SCRIPT FOR MENU TOGGLE -->
<script>
 const menuBtn = document.getElementById('menuBtn');
const mobileMenu = document.getElementById('mobileMenu');
const menuBackdrop = document.getElementById('menuBackdrop');

function openMenu() {
  mobileMenu.classList.add('active');
  menuBackdrop.classList.add('active');
  menuBtn.classList.add('active');
  menuBtn.setAttribute('aria-expanded', 'true');
}

function closeMenu() {
  mobileMenu.classList.remove('active');
  menuBackdrop.classList.remove('active');
  menuBtn.classList.remove('active');
  menuBtn.setAttribute('aria-expanded', 'false');
}

function toggleMenu(e) {
  e.stopPropagation();
  if (mobileMenu.classList.contains('active')) {
    closeMenu();
  } else {
    openMenu();
  }
}

if (menuBtn && mobileMenu && menuBackdrop) {
  // Toggle menu on button click
  menuBtn.addEventListener('click', toggleMenu);

  // Close menu when clicking on links
  document.querySelectorAll('#mobileMenu a').forEach(link => {
    link.addEventListener('click', closeMenu);
  });

  // Close menu when clicking on backdrop
  menuBackdrop.addEventListener('click', closeMenu);

  // Close menu on resize to desktop
  window.addEventListener('resize', () => {
    if (window.innerWidth >= 768) {
      closeMenu();
    }
  });

  // Prevent closing menu when clicking inside it
  mobileMenu.addEventListener('click', (e) => {
    e.stopPropagation();
  });
}

function setActiveLink() {
  const currentPath = window.location.pathname;

  document.querySelectorAll('.nav-link').forEach(link => {
    const linkPath = new URL(link.href).pathname;

    if (currentPath === linkPath) {
      link.classList.add('active');
    } else {
      link.classList.remove('active');
    }
  });
}

// เรียก setActiveLink() ใหม่เมื่อหน้าเปลี่ยน (สำหรับ SPA)
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
  setActiveLink();
});
} else {
  setActiveLink();
}

</script>
