<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Navbar</title>
</head>
<body class="bg-white dark:bg-gray-950">

<!-- NAVBAR - FIXED TOP -->
<div class="fixed top-0 left-0 w-full z-[9999] bg-white/80 dark:bg-gray-950/70 backdrop-blur-md border-b border-gray-200/70 dark:border-gray-800 transition-colors duration-300">

  <header class="max-w-7xl mx-auto flex items-center justify-between px-4 py-3">

    <!-- LOGO -->
    <a href="/" class="flex items-center gap-2 flex-shrink-0">
      <img 
        src="/images/logo.png"
        alt="IZANA NETWORK"
        class="h-10 w-auto drop-shadow-sm hover:drop-shadow-lg transition"
        loading="lazy"
        decoding="async"
      />
    </a>

    <!-- RIGHT SIDE: DESKTOP MENU + THEME TOGGLE -->
    <div class="flex items-center gap-4 flex-shrink-0">

      <!-- DESKTOP MENU -->
      <nav class="hidden md:flex gap-8 font-medium text-gray-700 dark:text-gray-300">
        <a 
          href="/home.html" 
          class="hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
        >
          หน้าแรก
        </a>
        <a 
          href="/packages.html" 
          class="hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
        >
          แพ็กเกจ
        </a>
        <a 
        href="/check-area.html"
        class="hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
      >
        ตรวจสอบพื้นที่
      </a>
         <a 
        href="/about.html"
        class="hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
      >
        เกี่ยวกับเรา
      </a>
        <a 
          href="/contact/" 
          class="hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
        >
          ติดต่อเรา
        </a>
      </nav>

      <!-- DARK MODE TOGGLE BUTTON (CIRCULAR) -->
      <button
        id="themeIcon"
        type="button"
        class="inline-flex items-center justify-center h-10 w-10 rounded-full border-2 border-gray-300 dark:border-gray-700 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition duration-200 flex-shrink-0"
        aria-label="Toggle dark mode"
      >
        <span class="text-xl">🌙</span>
      </button>

      <!-- MOBILE MENU BUTTON (3 LINES) - HIGH Z-INDEX -->
      <button 
        id="menuBtn" 
        type="button"
        class="md:hidden inline-flex flex-col justify-center items-center h-10 w-10 gap-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition duration-200 flex-shrink-0 relative z-[10000]"
        aria-label="Toggle menu"
        aria-expanded="false"
      >
        <span class="w-5 h-0.5 bg-gray-900 dark:bg-white transition-all duration-300"></span>
        <span class="w-5 h-0.5 bg-gray-900 dark:bg-white transition-all duration-300"></span>
        <span class="w-5 h-0.5 bg-gray-900 dark:bg-white transition-all duration-300"></span>
      </button>

    </div>

  </header>

  <!-- MOBILE MENU (HIDDEN BY DEFAULT) -->
  <div id="mobileMenu" class="hidden md:hidden border-t border-gray-200/70 dark:border-gray-800 bg-white dark:bg-gray-950 relative z-[9998]">
    <nav class="max-w-7xl mx-auto px-4 py-3 space-y-2 font-medium">
      <a 
        href="/home.html" 
        class="block py-3 px-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-900 hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
      >
        หน้าแรก
      </a>
      <a 
        href="/packages.html" 
        class="block py-3 px-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-900 hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
      >
        แพ็กเกจ
      </a>

      <a 
      href="/check-area.html"
      class="block py-3 px-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-900 hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
    >
      ตรวจสอบพื้นที่
    </a>

         <a 
      href="/about.html"
      class="block py-3 px-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-900 hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
    >
      เกี่ยวกับเรา
    </a>

      <a 
        href="/contact/" 
        class="block py-3 px-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-900 hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
      >
        ติดต่อเรา
      </a>
    </nav>
  </div>

</div>

<!-- SCRIPT FOR MENU TOGGLE -->
<script>
  const menuBtn = document.getElementById('menuBtn');
  const mobileMenu = document.getElementById('mobileMenu');

  if (menuBtn && mobileMenu) {
    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      mobileMenu.classList.toggle('hidden');
      menuBtn.setAttribute('aria-expanded', mobileMenu.classList.contains('hidden') ? 'false' : 'true');
    });

    // Close menu when clicking on links
    document.querySelectorAll('#mobileMenu a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.add('hidden');
        menuBtn.setAttribute('aria-expanded', 'false');
      });
    });

    // Close menu when clicking outside
    document.addEventListener('click', (event) => {
      if (!menuBtn.contains(event.target) && !mobileMenu.contains(event.target)) {
        mobileMenu.classList.add('hidden');
        menuBtn.setAttribute('aria-expanded', 'false');
      }
    });

    // Close menu on resize to desktop
    window.addEventListener('resize', () => {
      if (window.innerWidth >= 768) {
        mobileMenu.classList.add('hidden');
        menuBtn.setAttribute('aria-expanded', 'false');
      }
    });
  }
</script>

</body>
</html>
