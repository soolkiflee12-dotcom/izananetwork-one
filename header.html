<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Navbar</title>
</head>
<body class="bg-white dark:bg-gray-950">

<!-- NAVBAR -->
<div class="fixed top-0 left-0 w-full z-50 bg-white/80 dark:bg-gray-950/70 backdrop-blur-md border-b border-gray-200/70 dark:border-gray-800 transition-colors duration-300">

  <header class="max-w-7xl mx-auto flex items-center justify-between px-4 py-3">

    <!-- LOGO -->
    <a href="/izananetwork-one/" class="flex items-center gap-2 flex-shrink-0">
      <img 
        src="/izananetwork-one/images/logo.png"
        alt="IZANA NETWORK"
        class="h-10 w-auto drop-shadow-sm hover:drop-shadow-lg transition"
        loading="lazy"
        decoding="async"
      />
      <span class="hidden sm:inline font-bold text-gray-900 dark:text-white">izananetwork</span>
    </a>

    <!-- RIGHT SIDE: DESKTOP MENU + THEME TOGGLE -->
    <div class="flex items-center gap-4 flex-shrink-0">

      <!-- DESKTOP MENU -->
      <nav class="hidden md:flex gap-8 font-medium text-gray-700 dark:text-gray-300">
        <a 
          href="/izananetwork-one/" 
          class="hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
        >
          หน้าแรก
        </a>
        <a 
          href="/izananetwork-one/contact/" 
          class="hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
        >
          ติดต่อเรา
        </a>
      </nav>

      <!-- DARK MODE TOGGLE BUTTON (CIRCULAR) -->
      <button
        id="themeIcon"
        type="button"
        class="inline-flex items-center justify-center h-10 w-10 rounded-full border-2 border-gray-300 dark:border-gray-700 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition duration-200 flex-shrink-0"
        aria-label="Toggle dark mode"
      >
        <span class="text-xl">🌙</span>
      </button>

      <!-- MOBILE MENU BUTTON (3 LINES) - IMPROVED -->
      <button 
        id="menuBtn" 
        type="button"
        class="md:hidden inline-flex flex-col justify-center items-center h-10 w-10 gap-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition duration-200 flex-shrink-0"
        aria-label="Toggle menu"
        aria-expanded="false"
      >
        <span class="w-5 h-0.5 bg-gray-900 dark:bg-white transition-all duration-300"></span>
        <span class="w-5 h-0.5 bg-gray-900 dark:bg-white transition-all duration-300"></span>
        <span class="w-5 h-0.5 bg-gray-900 dark:bg-white transition-all duration-300"></span>
      </button>

    </div>

  </header>

  <!-- MOBILE MENU (HIDDEN BY DEFAULT) -->
  <div id="mobileMenu" class="hidden md:hidden border-t border-gray-200/70 dark:border-gray-800 bg-white dark:bg-gray-950">
    <nav class="max-w-7xl mx-auto px-4 py-3 space-y-2 font-medium">
      <a 
        href="/izananetwork-one/" 
        class="block py-3 px-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-900 hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
      >
        หน้าแรก
      </a>
      <a 
        href="/izananetwork-one/contact/" 
        class="block py-3 px-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-900 hover:text-blue-600 dark:hover:text-blue-400 transition duration-200"
      >
        ติดต่อเรา
      </a>
    </nav>
  </div>

</div>

</body>
</html>
